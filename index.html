<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub &amp; It's Commands</title>

  <!-- Inter + JetBrains Mono from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS (utilities & offcanvas only) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <!-- highlight.js — GitHub light theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ══ Top Navbar ══════════════════════════════════════════ -->
  <header class="app-nav" id="app-nav">
    <div class="app-nav-inner">

      <!-- Hamburger — mobile only -->
      <button class="hamburger d-lg-none"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#mobileSidebar"
              aria-controls="mobileSidebar"
              aria-label="Open navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Logo -->
      <a class="nav-logo" href="#" aria-label="GitHub Commands home">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        <span>Git Commands</span>
      </a>

      <!-- Language switcher -->
      <div class="lang-switcher" role="group" aria-label="Select language">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="es">ES</button>
      </div>

    </div>
  </header>

  <!-- ══ Mobile Offcanvas Sidebar ════════════════════════════ -->
  <div class="offcanvas offcanvas-start"
       tabindex="-1"
       id="mobileSidebar"
       aria-labelledby="mobileSidebarLabel">
    <div class="offcanvas-header">
      <span class="offcanvas-title" id="mobileSidebarLabel">Contents</span>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body p-0">
      <ul class="sidebar-nav" id="offcanvas-nav" aria-label="Page sections"></ul>
    </div>
  </div>

  <!-- ══ Main Layout ═════════════════════════════════════════ -->
  <div class="app-layout">

    <!-- Desktop Sidebar -->
    <aside class="app-sidebar d-none d-lg-flex" aria-label="Page sections">
      <div class="sidebar-inner">
        <p class="sidebar-label">On this page</p>
        <ul class="sidebar-nav" id="sidebar-nav"></ul>
      </div>
    </aside>

    <!-- Content -->
    <main class="app-main" id="app-main">
      <div class="content-wrapper">

        <header id="page-header">
          <h1 id="page-title"></h1>
          <p id="page-subtitle" class="page-subtitle"></p>
          <div class="page-divider"></div>
        </header>

        <div id="content-area">
          <div class="loading-state">
            <svg class="spin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
            <span>Loading&hellip;</span>
          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- Back to top -->
  <button id="back-to-top" aria-label="Back to top" title="Back to top">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
